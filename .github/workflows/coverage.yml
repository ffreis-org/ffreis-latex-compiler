name: Code Coverage (Codecov)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

  cancel-in-progress: true

jobs:
  coverage:
    if: ${{ !github.event.pull_request.draft }}

    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-coverage.yml@e9b9cc0cde6465b785f4b7c71d2180f5b265f42f
    with:
      go-version: "1.25.10"
      working-directory: "."
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
