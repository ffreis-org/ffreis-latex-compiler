name: Docker Build

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'containers/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/docker-build.yml'
  push:
    branches: [main, master]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'containers/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/docker-build.yml'

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

  cancel-in-progress: true

jobs:
  docker:
    permissions:
      contents: read
      packages: write
    uses: FelipeFuhr/ffreis-workflows-container/.github/workflows/container-build.yml@f75a40f7a44cade2b00a8843f75b3f86dfe80a0e
    with:
      image: "ffreis-latex-compiler"
      containerfile: "containers/Dockerfile.cli"
      context: "."
      skip-if-missing: true
      push: false
    secrets: inherit
