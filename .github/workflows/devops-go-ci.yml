name: DevOps / Go CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".github/workflows/**"
  push:
    branches: [main, master]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".golangci.yml"
      - ".github/workflows/**"
  merge_group:
    types: [checks_requested]

permissions:
  contents: read
  actions: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

  cancel-in-progress: true

jobs:
  # gofmt + go vet + golangci-lint + go mod tidy collapsed into ONE job (one
  # checkout + one Go toolchain setup) instead of three separate caller jobs.
  # GitHub bills per job rounded up to the minute, so this drops ~3 billed min
  # to ~1 with no loss of coverage (each check still runs + is named on failure).
  quick-checks:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-quick-checks.yml@d7bf8fd2b474bbf40dad3dcb2ff41091c4d6ab9e
    with:
      go-version: "1.25.10"
      working-directory: "."

  # Heavy jobs stay separate. They gate on quick-checks so a fmt/lint/tidy
  # failure short-circuits before spending test minutes. go-test.yml@d7bf8fd
  # enables Go's test-result cache by default (unchanged packages report cached).
  test:
    if: ${{ !github.event.pull_request.draft }}
    needs: [quick-checks]
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-test.yml@d7bf8fd2b474bbf40dad3dcb2ff41091c4d6ab9e
    with:
      go-version: "1.25.10"
      working-directory: "."
      run-govulncheck: false

  integration:
    if: ${{ !github.event.pull_request.draft }}
    needs: [quick-checks]
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-test.yml@d7bf8fd2b474bbf40dad3dcb2ff41091c4d6ab9e
    with:
      go-version: "1.25.10"
      working-directory: "."
      test-tags: "integration"
      run-govulncheck: false
