name: Build All (Go Matrix)

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

  cancel-in-progress: true

jobs:
  build:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-cross-build-matrix.yml@e9b9cc0cde6465b785f4b7c71d2180f5b265f42f
    with:
      go-version: "1.25.10"
      working-directory: "."
      targets: |-
        ./cmd/ffreis-latex-compiler
