name: Build All (Go Matrix)

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

  cancel-in-progress: true

jobs:
  build:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-cross-build-matrix.yml@e9b9cc0cde6465b785f4b7c71d2180f5b265f42f
    with:
      go-version: "1.25.10"
      # PR builds linux only (x both arches). Full GOOS matrix (linux/darwin/
      # windows) runs on push to main and on manual workflow_dispatch. These are
      # cross-compiles on ubuntu (1x billing) but 6 jobs/PR-iteration adds up.
      goos: ${{ github.event_name == 'pull_request' && 'linux' || 'linux,darwin,windows' }}
      working-directory: "."
      targets: |-
        ./cmd/ffreis-latex-compiler
